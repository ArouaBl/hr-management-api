<div class="employee-form">
  <h2>{{ isEditMode ? "Modifier l'employe" : 'Nouvel employe' }}</h2>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form (ngSubmit)="onSubmit()" #empForm="ngForm">
    <div class="form-group">
      <label for="firstName">Prenom *</label>
      <input
        type="text"
        id="firstName"
        name="firstName"
        [(ngModel)]="employee.firstName"
        required
      />
    </div>

    <div class="form-group">
      <label for="lastName">Nom *</label>
      <input
        type="text"
        id="lastName"
        name="lastName"
        [(ngModel)]="employee.lastName"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="employee.email"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Telephone</label>
      <input type="text" id="phone" name="phone" [(ngModel)]="employee.phone" />
    </div>

    <div class="form-group">
      <label for="address">Adresse</label>
      <input type="text" id="address" name="address" [(ngModel)]="employee.address" />
    </div>

    <div class="form-group">
      <label for="position">Poste</label>
      <input type="text" id="position" name="position" [(ngModel)]="employee.position" />
    </div>

    <div class="form-group">
      <label for="hireDate">Date d'embauche</label>
      <input type="date" id="hireDate" name="hireDate" [(ngModel)]="employee.hireDate" />
    </div>

    <div class="form-group">
      <label for="salary">Salaire</label>
      <input type="number" id="salary" name="salary" [(ngModel)]="employee.salary" />
    </div>

    <div class="form-group">
      <label for="departmentId">Departement *</label>
      <select
        id="departmentId"
        name="departmentId"
        [(ngModel)]="employee.departmentId"
        required
      >
        <option [ngValue]="0" disabled>-- Choisir un departement --</option>
        <option *ngFor="let dept of departments" [ngValue]="dept.id">
          {{ dept.name }}
        </option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="empForm.invalid">
        Enregistrer
      </button>
      <button type="button" class="btn" (click)="onCancel()">Annuler</button>
    </div>
  </form>
</div>
