<p>employee-list works!</p>
<div class="employee-list">
  <div class="header">
    <h2>Employes</h2>
    <a routerLink="/employees/new" class="btn btn-primary">+ Nouvel employe</a>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <table *ngIf="employees.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Email</th>
        <th>Poste</th>
        <th>Departement</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.id }}</td>
        <td>{{ emp.firstName }} {{ emp.lastName }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.position }}</td>
        <td>{{ emp.departmentName }}</td>
        <td>
          <a [routerLink]="['/employees', emp.id, 'edit']" class="btn btn-small">Modifier</a>
          <button (click)="deleteEmployee(emp.id)" class="btn btn-small btn-danger">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="employees.length === 0 && !errorMessage">Aucun employe pour le moment.</p>
</div>
